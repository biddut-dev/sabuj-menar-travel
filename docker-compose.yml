version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: sabuj_menar_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sabuj_menar_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  adminer:
    image: adminer
    container_name: sabuj_menar_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
